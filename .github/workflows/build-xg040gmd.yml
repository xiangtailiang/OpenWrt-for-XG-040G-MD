name: Build OpenWrt for XG-040G-MD

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: "Clean build before compiling"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-xg040gmd.yml"

env:
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    name: Build XG-040G-MD Firmware
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show disk space
        run: |
          df -h
          free -h
          nproc

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged \
            help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
            mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 \
            python3-pip python3-ply python3-docutils qemu-utils rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim \
            wget xmlto xxd zlib1g-dev zstd

      - name: Set build user permission
        run: |
          sudo chown -R $USER:$GROUPS $GITHUB_WORKSPACE

      - name: Clean build if requested
        if: github.event.inputs.clean_build == 'true'
        run: |
          make clean || true
          make dirclean || true

      - name: Add custom feeds
        run: |
          echo "" >> feeds.conf.default
          echo "# ===== Custom feeds for XG-040G-MD =====" >> feeds.conf.default

          grep -q "daeuniverse/openwrt-dae" feeds.conf.default || \
            echo "src-git dae https://github.com/daeuniverse/openwrt-dae.git" >> feeds.conf.default

          grep -q "sbwml/luci-app-mosdns" feeds.conf.default || \
            echo "src-git mosdns https://github.com/sbwml/luci-app-mosdns.git" >> feeds.conf.default

          grep -q "gdy666/luci-app-lucky" feeds.conf.default || \
            echo "src-git lucky https://github.com/gdy666/luci-app-lucky.git" >> feeds.conf.default

          grep -q "linkease/istore" feeds.conf.default || \
            echo "src-git istore https://github.com/linkease/istore.git" >> feeds.conf.default

          cat feeds.conf.default

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create default config files
        run: |
          mkdir -p files/etc/config
          mkdir -p files/etc/uci-defaults

          cat > files/etc/config/network <<'EOF'
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
                  option netmask '255.0.0.0'

          config globals 'globals'
                  option ula_prefix 'fd00:040g:md::/48'

          config device
                  option name 'br-lan'
                  option type 'bridge'
                  list ports 'lan1'

          config interface 'lan'
                  option device 'br-lan'
                  option proto 'static'
                  option ipaddr '192.168.1.1'
                  option netmask '255.255.255.0'
                  option ip6assign '60'

          config interface 'wan'
                  option device 'lan2'
                  option proto 'dhcp'

          config interface 'wan6'
                  option device 'lan2'
                  option proto 'dhcpv6'
          EOF

          cat > files/etc/config/dhcp <<'EOF'
          config dnsmasq
                  option domainneeded '1'
                  option boguspriv '1'
                  option filterwin2k '0'
                  option localise_queries '1'
                  option rebind_protection '1'
                  option rebind_localhost '1'
                  option local '/lan/'
                  option domain 'lan'
                  option expandhosts '1'
                  option cachesize '1000'
                  option authoritative '1'
                  option readethers '1'
                  option leasefile '/tmp/dhcp.leases'
                  option resolvfile '/tmp/resolv.conf.d/resolv.conf.auto'
                  option localservice '1'
                  option ednspacket_max '1232'

          config dhcp 'lan'
                  option interface 'lan'
                  option start '100'
                  option limit '150'
                  option leasetime '12h'
                  option dhcpv4 'server'
                  option dhcpv6 'server'
                  option ra 'server'
                  option ra_slaac '1'
                  list ra_flags 'managed-config'
                  list ra_flags 'other-config'

          config dhcp 'wan'
                  option interface 'wan'
                  option ignore '1'

          config odhcpd 'odhcpd'
                  option maindhcp '0'
                  option leasefile '/tmp/hosts/odhcpd'
                  option leasetrigger '/usr/sbin/odhcpd-update'
                  option loglevel '4'
          EOF

          cat > files/etc/config/firewall <<'EOF'
          config defaults
                  option input 'REJECT'
                  option output 'ACCEPT'
                  option forward 'REJECT'
                  option synflood_protect '1'
                  option flow_offloading '1'
                  option flow_offloading_hw '0'

          config zone
                  option name 'lan'
                  list network 'lan'
                  option input 'ACCEPT'
                  option output 'ACCEPT'
                  option forward 'ACCEPT'

          config zone
                  option name 'wan'
                  list network 'wan'
                  list network 'wan6'
                  option input 'REJECT'
                  option output 'ACCEPT'
                  option forward 'REJECT'
                  option masq '1'
                  option mtu_fix '1'

          config forwarding
                  option src 'lan'
                  option dest 'wan'

          config rule
                  option name 'Allow-DHCP-Renew'
                  option src 'wan'
                  option proto 'udp'
                  option dest_port '68'
                  option target 'ACCEPT'
                  option family 'ipv4'

          config rule
                  option name 'Allow-Ping'
                  option src 'wan'
                  option proto 'icmp'
                  option icmp_type 'echo-request'
                  option family 'ipv4'
                  option target 'ACCEPT'

          config rule
                  option name 'Allow-IGMP'
                  option src 'wan'
                  option proto 'igmp'
                  option family 'ipv4'
                  option target 'ACCEPT'

          config rule
                  option name 'Allow-DHCPv6'
                  option src 'wan'
                  option proto 'udp'
                  option dest_port '546'
                  option family 'ipv6'
                  option target 'ACCEPT'

          config rule
                  option name 'Allow-MLD'
                  option src 'wan'
                  option proto 'icmp'
                  option src_ip 'fe80::/10'
                  list icmp_type '130/0'
                  list icmp_type '131/0'
                  list icmp_type '132/0'
                  list icmp_type '143/0'
                  option family 'ipv6'
                  option target 'ACCEPT'

          config rule
                  option name 'Allow-ICMPv6-Input'
                  option src 'wan'
                  option proto 'icmp'
                  list icmp_type 'echo-request'
                  list icmp_type 'echo-reply'
                  list icmp_type 'destination-unreachable'
                  list icmp_type 'packet-too-big'
                  list icmp_type 'time-exceeded'
                  list icmp_type 'bad-header'
                  list icmp_type 'unknown-header-type'
                  list icmp_type 'router-solicitation'
                  list icmp_type 'neighbour-solicitation'
                  list icmp_type 'router-advertisement'
                  list icmp_type 'neighbour-advertisement'
                  option limit '1000/sec'
                  option family 'ipv6'
                  option target 'ACCEPT'

          config rule
                  option name 'Allow-ICMPv6-Forward'
                  option src 'wan'
                  option dest '*'
                  option proto 'icmp'
                  list icmp_type 'echo-request'
                  list icmp_type 'echo-reply'
                  list icmp_type 'destination-unreachable'
                  list icmp_type 'packet-too-big'
                  list icmp_type 'time-exceeded'
                  list icmp_type 'bad-header'
                  list icmp_type 'unknown-header-type'
                  option limit '1000/sec'
                  option family 'ipv6'
                  option target 'ACCEPT'
          EOF

          cat > files/etc/uci-defaults/99-custom-zram <<'EOF'
          #!/bin/sh

          uci set system.@system[0].zonename='Asia/Shanghai'
          uci set system.@system[0].timezone='CST-8'
          uci commit system

          if [ -x /etc/init.d/zram ]; then
                  uci -q set zram.@zram[0].enabled='1'
                  uci -q set zram.@zram[0].disksize='128'
                  uci -q set zram.@zram[0].comp_algo='lz4'
                  uci -q commit zram
                  /etc/init.d/zram enable
          fi

          exit 0
          EOF

          chmod +x files/etc/uci-defaults/99-custom-zram

      - name: Add custom package config
        run: |
          cat >> .config <<'EOF'

          # =========================
          # LuCI
          # =========================
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-opkg=y

          # =========================
          # DHCP / DNS / IPv6
          # =========================
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_ipset=y

          # =========================
          # PPPoE
          # =========================
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y

          # =========================
          # Firewall / NAT / Flow Offload
          # =========================
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_kmod-nft-core=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-nf-flow=y
          CONFIG_PACKAGE_kmod-nf-nat=y

          # =========================
          # Tools
          # =========================
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_mount-utils=y

          # =========================
          # USB2.0 / USB3.0 / USB Storage
          # =========================
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y
          CONFIG_PACKAGE_usbutils=y

          # =========================
          # Filesystems
          # =========================
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_dosfstools=y
          CONFIG_PACKAGE_ntfs-3g=y

          # =========================
          # NLS
          # =========================
          CONFIG_PACKAGE_kmod-nls-base=y
          CONFIG_PACKAGE_kmod-nls-cp437=y
          CONFIG_PACKAGE_kmod-nls-iso8859-1=y
          CONFIG_PACKAGE_kmod-nls-utf8=y

          # =========================
          # zram
          # =========================
          CONFIG_PACKAGE_kmod-zram=y
          CONFIG_PACKAGE_zram-swap=y

          # =========================
          # dae / daed
          # 部分源码里包名可能不同，不存在的项 make defconfig 会自动丢弃
          # =========================
          CONFIG_PACKAGE_dae=y
          CONFIG_PACKAGE_daed=y
          CONFIG_PACKAGE_luci-app-daed=y

          # =========================
          # MosDNS
          # =========================
          CONFIG_PACKAGE_mosdns=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_v2dat=y

          # =========================
          # Geo data
          # =========================
          CONFIG_PACKAGE_v2ray-geoip=y
          CONFIG_PACKAGE_v2ray-geosite=y
          CONFIG_PACKAGE_geoview=y
          CONFIG_PACKAGE_geosite.dat=y
          CONFIG_PACKAGE_geoip.dat=y
          CONFIG_PACKAGE_gecoosac=y

          # =========================
          # Lucky
          # =========================
          CONFIG_PACKAGE_lucky=y
          CONFIG_PACKAGE_luci-app-lucky=y

          # =========================
          # microsocks
          # =========================
          CONFIG_PACKAGE_microsocks=y

          # =========================
          # iStore / luci-app-store
          # =========================
          CONFIG_PACKAGE_luci-app-store=y

          EOF

      - name: Make defconfig
        run: |
          make defconfig

      - name: Show selected packages
        run: |
          echo "===== Selected packages ====="
          grep -E "CONFIG_PACKAGE_(dae|daed|luci-app-daed|mosdns|luci-app-mosdns|lucky|luci-app-lucky|microsocks|luci-app-store|kmod-zram|zram-swap|kmod-usb|dnsmasq-full|geo|v2ray)" .config || true

          echo "===== Target info ====="
          grep -E "CONFIG_TARGET|CONFIG_DEFAULT_TARGET" .config || true

      - name: Download packages
        run: |
          make download -j8 V=s

      - name: Build firmware
        run: |
          make -j$(nproc) V=s

      - name: Organize firmware
        if: always()
        run: |
          mkdir -p firmware
          if [ -d bin/targets ]; then
            find bin/targets -type f \( \
              -name "*.bin" -o \
              -name "*.img" -o \
              -name "*.trx" -o \
              -name "*.itb" -o \
              -name "*.ubi" -o \
              -name "*.ubifs" -o \
              -name "*.tar" -o \
              -name "*.gz" -o \
              -name "*.manifest" -o \
              -name "sha256sums" \
            \) -exec cp -v {} firmware/ \;
          fi

          echo "===== Firmware files ====="
          ls -lh firmware || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: XG-040G-MD-firmware
          path: firmware
          retention-days: 30

      - name: Upload build config
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: XG-040G-MD-config
          path: |
            .config
            feeds.conf.default
            files/etc/config/network
            files/etc/config/dhcp
            files/etc/config/firewall
          retention-days: 30
